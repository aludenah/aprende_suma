            { id: 11, name: 'Química', icon: 'flask-conical', category: 'Ciencias', topics: ['Estructura Atómica', 'Números Cuánticos', 'Distribución Electrónica', 'Tabla Periódica Actual', 'Enlace Químico I', 'Enlace Químico II', 'Cantidad de Sustancia', 'Estado Gaseoso I', 'Reacciones Químicas I', 'Reacciones Químicas II', 'Estequiometría I', 'Estequiometría II', 'Masa Equivalente', 'Soluciones I', 'Soluciones II', 'Cinética Química', 'Equilibrio Químico', 'Ácidos y Bases', 'Celdas Galvánicas y Electrolíticas', 'Introducción a la Química Orgánica', 'Química Orgánica: Hidrocarburos', 'Química Orgánica: Funciones Oxigenadas I', 'Química Orgánica: Funciones Oxigenadas II', 'Compuestos Aromáticos'] },
            { id: 12, name: 'Álgebra', icon: 'calculator', category: 'Matemáticas', topics: ['Polinomios I: Expresiones Algebraicas', 'Polinomios II: Teoría de Grados', 'Productos Notables', 'División I: Horner y Ruffini', 'División II: Teorema del Resto y Divisibilidad', 'Cocientes Notables', 'Factorización I', 'Factorización II', 'Factorial y Número Combinatorio', 'Binomio de Newton', 'Radicación', 'Teoría de Ecuaciones', 'Ecuaciones Cuadráticas', 'Ecuaciones Polinomiales', 'Matrices y Determinantes', 'Sistemas de Ecuaciones', 'Desigualdades e Inecuaciones Racionales', 'Inecuaciones Irracionales y Exponenciales', 'Valor Absoluto – Ecuaciones e Inecuaciones', 'Sistemas de Inecuaciones y Programación Lineal', 'Funciones I', 'Funciones Especiales II', 'Logaritmos I', 'Logaritmos II'] },
            { id: 13, name: 'Aritmética', icon: 'calculator', category: 'Matemáticas', topics: ['Razones y Proporciones', 'Serie de Razones Geométricas Equivalentes', 'Promedios', 'Magnitudes Proporcionales y Regla de Tres', 'Reparto Proporcional', 'Tanto Por Ciento', 'Regla de Mezcla', 'Regla de Interés', 'Regla de Descuento', 'Lógica Proposicional', 'Teoría de Conjuntos I', 'Teoría de Conjuntos II', 'Teoría Numeración', 'Conteo de Números', 'Adición y Sustracción', 'Multiplicación y División', 'Divisibilidad', 'Criterios de Divisibilidad', 'Números Primos', 'MCM y MCD', 'Números Racionales I', 'Números Racionales II', 'Análisis Combinatorio', 'Probabilidades'] },
            { id: 14, name: 'Geometría', icon: 'layout', category: 'Matemáticas', topics: ['Triángulo', 'Líneas Notables', 'Triángulos Congruentes', 'Cuadrilátero', 'Cuadriláteros II', 'Ángulos en la Circunferencia', 'Líneas en la Circunferencia', 'Puntos Notables', 'Proporcionalidad de Segmentos y Semejanzas', 'Relaciones Métricas en la Circunferencia', 'Relaciones Métricas en Triángulos Rectángulos', 'Relaciones Métricas en Triángulos Oblicuángulos', 'Área de Regiones Triangulares', 'Área de Regiones Cuadrangulares', 'Área de Regiones Circulares', 'Poliedros Regulares', 'Prisma y Cilindro', 'Pirámide y Cono', 'Esfera y Pappus', 'Plano Cartesiano', 'Ecuación de la Recta', 'Ecuación de la Circunferencia', 'Ecuación de la Parábola', 'Ecuación de la Elipse'] },
            { id: 15, name: 'Raz. Matemático', icon: 'brain', category: 'Matemáticas', topics: ['Juegos Lógicos', 'Razonamiento Lógico I', 'Razonamiento Lógico II', 'Calendarios', 'Algoritmia Sensorial I', 'Algoritmia Sensorial II', 'Planteo de Ecuaciones I', 'Planteo de Ecuaciones II', 'Interpretación de Enunciados', 'Arreglos Numéricos', 'Operaciones Matemáticas', 'Sucesiones', 'Cronometría I', 'Cronometría II', 'Certezas - Máximos y Mínimos', 'Razonamiento Geométrico', 'Frecuencia de Sucesos', 'Deducción Simple y Deducción Compuesta', 'Formas y Movimientos', 'Situaciones Topológicas', 'Localización', 'Problemas de Cantidad e Inferencia', 'Interpretación de Gráficos Estadísticos', 'Simetría y Reflexiones'] },
            { id: 16, name: 'Trigonometría', icon: 'layout', category: 'Matemáticas', topics: ['Sistema de Medición Angular', 'Razones Trigonométricas de un Ángulo Agudo I', 'Razones Trigonométricas de un Ángulo Agudo II', 'Resolución de Triángulos Rectángulos', 'Geometría Analítica', 'RT de un Ángulo en Posición Normal I', 'RT de un Ángulo en Posición Normal II', 'Reducción al Primer Cuadrante I', 'Reducción al Primer Cuadrante II', 'Circunferencia Trigonométrica I', 'Circunferencia Trigonométrica II', 'Identidades Trigonométricas Fundamentales', 'Identidades de Ángulos Compuestos I', 'Identidades de Ángulos Compuestos II', 'Identidades de Ángulo Doble', 'Identidades de Ángulo Triple', 'Transformaciones Trigonométricas', 'Funciones Trigonométricas I', 'Funciones Trigonométricas II', 'Funciones Trigonométricas Inversas', 'Ecuaciones Trigonométricas I', 'Ecuación Trigonométrica II', 'Resolución de Triángulos Oblicuángulos', 'Práctica Integral'] },
        ];

        const STATS = [
            { value: '16', label: 'Cursos', icon: 'book-open' },
            { value: '384', label: 'Capítulos', icon: 'layout' },
            { value: '24', label: 'Temas por Curso', icon: 'check-square' },
            { value: '+5k', label: 'Minutos', icon: 'clock' },
        ];

        const METHODOLOGY = [
            { title: 'Teoría', time: '10-15 min', desc: 'Explicación concisa de los conceptos clave.', icon: 'play-circle' },
            { title: 'Práctica', time: '10-15 min', desc: 'Resolución de 8 problemas tipo examen de admisión.', icon: 'edit-3' },
            { title: 'Autoaprendizaje', time: 'Test interactivo', desc: 'Formulario de 10 preguntas con retroalimentación.', icon: 'check-square' },
            { title: 'Solucionario', time: 'PDF descargable', desc: 'Material paso a paso para reforzar lo aprendido.', icon: 'file-down' },
        ];

        // --- ESTADO DE LA APLICACIÓN ---
        let state = {
            activeCourse: null,
            activeTopicIndex: 0,
            activeTab: 'Teoría',
            mobileMenuOpen: false
        };

        // --- FUNCIONES DE ACTUALIZACIÓN DE ESTADO ---
        function openCourse(courseId) {
            state.activeCourse = COURSES.find(c => c.id === courseId);
            state.activeTopicIndex = 0;
            state.activeTab = 'Teoría';
            renderApp();
            window.scrollTo(0, 0);
        }

        function closeCourse() {
            state.activeCourse = null;
            renderApp();
            window.scrollTo(0, 0);
        }

        function setTopic(index) {
            state.activeTopicIndex = index;
            renderApp();
        }

        function setTab(tab) {
            state.activeTab = tab;
            renderApp();
        }

        function toggleMobileMenu() {
            state.mobileMenuOpen = !state.mobileMenuOpen;
            renderApp();
        }

        function scrollToSection(id) {
            state.mobileMenuOpen = false;
            renderApp();
            setTimeout(() => {
                const el = document.getElementById(id);
                if (el) el.scrollIntoView({ behavior: 'smooth' });
            }, 50);
        }

        // --- RENDERIZADO HTML ---
        function renderApp() {
            const app = document.getElementById('app');
            
            if (state.activeCourse) {
                app.innerHTML = renderVirtualClassroom();
            } else {
                app.innerHTML = renderLandingPage();
            }

            // Inicializar iconos de Lucide después de actualizar el DOM
            lucide.createIcons();
        }

        function renderVirtualClassroom() {
            const course = state.activeCourse;
            const topicName = course.topics[state.activeTopicIndex];
            const topicNumber = String(state.activeTopicIndex + 1).padStart(2, '0');
            const tabs = ['Teoría', 'Práctica', 'Evaluación', 'Materiales'];

            // Generar la lista de temas en el sidebar
            let topicsListHtml = '';
            course.topics.forEach((topic, i) => {
                const isActive = state.activeTopicIndex === i;
                const activeClass = isActive 
                    ? 'bg-white shadow-sm border border-gray-100 text-blue-900 font-medium' 
                    : 'text-gray-500 hover:bg-gray-100';
                const numberClass = isActive ? 'text-red-600 font-bold' : 'text-gray-400';
                const topicNum = String(i + 1).padStart(2, '0');

                topicsListHtml += `
                    <li>
                        <button onclick="setTopic(${i})" class="w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 transition-colors ${activeClass}">
                            <span class="text-xs shrink-0 ${numberClass}">${topicNum}</span>
                            <span class="text-sm truncate" title="${topic}">${topic}</span>
                        </button>
                    </li>
                `;
            });

            // Generar pestañas
            let tabsHtml = '';
            tabs.forEach(tab => {
                const isActive = state.activeTab === tab;
                const tabClass = isActive ? 'text-blue-900' : 'text-gray-400 hover:text-gray-600';
                const underlineHtml = isActive ? '<span class="absolute bottom-0 left-0 w-full h-0.5 bg-red-600 rounded-t-full"></span>' : '';
                
                tabsHtml += `
                    <button onclick="setTab('${tab}')" class="pb-4 text-sm font-medium transition-colors relative ${tabClass}">
                        ${tab}
                        ${underlineHtml}
                    </button>
                `;
            });

            return `
                <div class="flex flex-col h-screen bg-white">
                    <!-- Navbar Aula Virtual -->
                    <header class="border-b border-gray-100 p-4 flex items-center justify-between z-10 bg-white shrink-0">
                        <div class="flex items-center gap-4">
                            <button onclick="closeCourse()" class="p-2 text-gray-400 hover:text-blue-900 hover:bg-gray-50 rounded-full transition-colors">
                                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                            </button>
                            <div>
                                <h1 class="font-semibold text-lg text-blue-900">${course.name}</h1>
                                <p class="text-xs text-gray-500 tracking-wide uppercase">Educación sin Límites</p>
                            </div>
                        </div>
                        <div class="hidden md:flex items-center">
                            <span class="text-xs font-semibold text-red-600 bg-red-50 px-3 py-1 rounded-full uppercase tracking-wider">Sistema Helicoidal</span>
                        </div>
                    </header>

                    <!-- Contenido Principal Aula Virtual -->
                    <div class="flex flex-1 overflow-hidden">
                        <!-- Sidebar (Temario) -->
                        <aside class="w-72 bg-gray-50 border-r border-gray-100 overflow-y-auto hidden md:block custom-scrollbar shrink-0">
                            <div class="p-6">
                                <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Temario del Curso</h2>
                                <ul class="space-y-1">
                                    ${topicsListHtml}
                                </ul>
                            </div>
                        </aside>

                        <!-- Área de Estudio -->
                        <main class="flex-1 overflow-y-auto bg-white p-6 md:p-12 custom-scrollbar">
                            <div class="max-w-3xl mx-auto">
                                
                                <!-- Reproductor de Video -->
                                <div class="w-full aspect-video bg-gray-100 rounded-2xl flex items-center justify-center group cursor-pointer relative overflow-hidden border border-gray-100 shadow-sm">
                                    <i data-lucide="play-circle" class="w-16 h-16 text-gray-300 group-hover:text-red-600 group-hover:scale-110 transition-all duration-300"></i>
                                    <div class="absolute bottom-6 left-6">
                                        <span class="bg-black/50 backdrop-blur-sm text-white text-xs px-3 py-1.5 rounded-full">15:00 min</span>
                                    </div>
                                </div>

                                <div class="mt-8">
                                    <h2 class="text-2xl font-semibold text-blue-900 mb-2">Tema ${topicNumber}: ${topicName}</h2>
                                    <p class="text-gray-500 text-sm">Profesor Experto en Preparación Preuniversitaria</p>
                                </div>

                                <!-- Pestañas de Navegación -->
                                <div class="mt-10 border-b border-gray-100 flex gap-8">
                                    ${tabsHtml}
                                </div>
                                    
                                <!-- Contenido de la pestaña -->
                                <div class="py-8">
                                    <p class="text-gray-600 leading-relaxed mb-8">
                                        En esta sesión abarcaremos los principios esenciales del curso. Aplicaremos el nivel helicoidal para asegurar el dominio progresivo de los temas más recurrentes en los exámenes de admisión.
                                    </p>
                                    
                                    <div class="bg-gray-50 p-6 rounded-2xl flex items-start gap-4 border border-gray-100">
                                        <i data-lucide="award" class="w-6 h-6 text-blue-900 shrink-0 mt-1"></i>
                                        <div>
                                            <h4 class="font-semibold text-blue-900 mb-1">Rigor Académico</h4>
                                            <p class="text-sm text-gray-500 leading-relaxed">Contenido actualizado y diseñado específicamente para enfrentar los exámenes de admisión de las principales universidades del país.</p>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </main>
                    </div>
                </div>
            `;
        }

        function renderLandingPage() {
            // Generar tarjetas de estadísticas
            let statsHtml = '';
            STATS.forEach(stat => {
                statsHtml += `
                    <div class="flex flex-col items-center justify-center text-center px-4">
                        <i data-lucide="${stat.icon}" class="w-8 h-8 text-blue-900 mb-4 opacity-80"></i>
                        <p class="text-3xl md:text-4xl font-bold text-blue-900 mb-2">${stat.value}</p>
                        <p class="text-xs text-gray-400 font-semibold uppercase tracking-wider">${stat.label}</p>
                    </div>
                `;
            });

            // Generar tarjetas de metodología
            let methodologyHtml = '';
            METHODOLOGY.forEach(step => {
                methodologyHtml += `
                    <div class="bg-white rounded-2xl p-8 border border-gray-100 hover:border-blue-100 hover:shadow-md transition-all">
                        <div class="mb-6 bg-gray-50 w-12 h-12 rounded-xl flex items-center justify-center">
                            <i data-lucide="${step.icon}" class="w-6 h-6 text-red-600"></i>
                        </div>
                        <h3 class="text-lg font-semibold text-blue-900 mb-1">${step.title}</h3>
                        <span class="block text-xs text-red-600 font-medium mb-4">${step.time}</span>
                        <p class="text-gray-500 text-sm leading-relaxed">${step.desc}</p>
                    </div>
                `;
            });

            // Generar tarjetas de cursos
            let coursesHtml = '';
            COURSES.forEach(course => {
                coursesHtml += `
                    <button onclick="openCourse(${course.id})" class="group flex items-center p-4 bg-gray-50 rounded-2xl hover:bg-blue-900 hover:text-white transition-all text-left border border-transparent hover:border-blue-900">
                        <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center text-blue-900 group-hover:text-red-600 shrink-0 shadow-sm mr-4 transition-colors">
                            <i data-lucide="${course.icon}" class="w-5 h-5"></i>
                        </div>
                        <div class="overflow-hidden">
                            <h3 class="font-semibold text-gray-800 group-hover:text-white text-sm truncate">${course.name}</h3>
                            <span class="text-[10px] text-gray-400 group-hover:text-blue-200 uppercase tracking-wider">${course.category}</span>
                        </div>
                    </button>
                `;
            });

            // Menú móvil
